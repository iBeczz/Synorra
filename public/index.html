          <div class="map-panel">
            <div id="run-map"></div>
            <div class="map-color-legend">
              <span id="map-legend-low">Low</span>
              <div class="map-color-bar"></div>
              <span id="map-legend-high">High</span>
            </div>
            <div class="map-color-labels">
              <span id="map-label-low"></span>
              <span id="map-label-high"></span>
            </div>
          </div>
        </div>
      </div>

      ${zones.length || true ? `
      <div class="section">
        <div class="section-head">Heart rate zones
          <button class="zone-edit-btn" onclick="toggleZoneEditor()">Edit zones</button>
        </div>
        <div id="zone-editor" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:var(--muted);">
          <div style="font-size:10px;color:var(--faint);margin-bottom:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;">Set zone boundaries in BPM</div>
          ${['Z1/Z2','Z2/Z3','Z3/Z4','Z4/Z5'].map((label, i) => {
            const keys = ['z12','z23','z34','z45'];
            const defaults = [120,148,162,174];
            const b = customZoneBounds || {};
            return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);">
              <span style="font-family:var(--mono);font-size:11px;width:60px;">${label}</span>
              <input type="number" id="zb_${keys[i]}" class="effort-input" style="width:70px;padding:4px 8px;" value="${b[keys[i]] || defaults[i]}" min="60" max="220">
              <span style="font-size:11px;color:var(--faint);">bpm</span>
            </div>`;
          }).join('')}
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-disconnect" style="font-size:11px;padding:4px 12px;" onclick="saveZoneBounds()">Save &amp; apply</button>
            <button class="btn-disconnect" style="font-size:11px;padding:4px 12px;" onclick="resetZoneBounds()">Reset defaults</button>
          </div>
        </div>
        ${zones.map(z => `
          <div class="zone-row">
            <span class="zone-name">${z.name}</span>
            <div class="zone-track"><div class="zone-fill" style="width:${z.pct}%;background:${z.color};"></div></div>
            <span class="zone-pct">${z.pct}%</span>
            <span class="zone-time">${fmtTime(z.secs)}</span>
          </div>
        `).join('')}
      </div>` : ''}

      ${spikes.length ? `
      <div class="section">
        <div class="section-head">Notable moments</div>
        <div class="spike-grid">
          ${spikes.map(s => `
            <div class="spike-row">
              <div class="spike-icon" style="background:${s.bgColor};">${s.icon}</div>
              <div class="spike-body">
                <div class="spike-title">${s.title}</div>
                <div class="spike-detail">${s.detail}</div>
              </div>
              <div class="spike-km">${s.at}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}


      <div class="section" id="whoop-section"></div>

    </div>
  `;

  activeStreams = new Set(['hr', 'pace']);
  pinnedSplitKm = null; chartSplitActiveKm = null;
  rebuildChart();
  initMap(streams);
  renderWhoopSection();
}

// ─── CHART ───
function toggleStream(key, btn) {
  if (activeStreams.has(key)) {
    if (activeStreams.size === 1) return; // keep at least one
    activeStreams.delete(key);
  } else {
    activeStreams.add(key);
  }
  document.querySelectorAll('.chart-tab[data-stream]').forEach(b => {
    const k = b.dataset.stream;
    const on = activeStreams.has(k);
    const c = STREAM_CFG[k]?.color || 'var(--orange)';
    b.style.borderColor = on ? c : '';
    b.style.color       = on ? c : '';
    b.style.background  = on ? c + '18' : '';
  });
  rebuildChart();
}

function rebuildChart() {
  if (!streamData) return;
  const timeArr = streamData.time?.data || [];
  const distArr = streamData.distance?.data || [];
  const N = timeArr.length; if (!N) return;
  const step = Math.max(1, Math.floor(N / 400));
  const labels = [];
  for (let i = 0; i < N; i += step) labels.push(distArr[i] ? (distArr[i]/1000).toFixed(2) : (timeArr[i]/60).toFixed(1));

  const datasets = [];
  const axes = {};
  let leftUsed = false, rightUsed = false;

  for (const [key, cfg] of Object.entries(STREAM_CFG)) {
    if (!activeStreams.has(key)) continue;
    const raw = streamData[cfg.key]?.data || [];
    if (!raw.length) continue;
    const data = [];
    for (let i = 0; i < N; i += step) data.push(cfg.xform(raw[i] ?? null));
    const axId = 'y_' + key;
    const isRight = cfg.side === 'right';
    const showAxis = isRight ? !rightUsed : !leftUsed;
    if (isRight) rightUsed = true; else leftUsed = true;
    axes[axId] = {
      position: isRight ? 'right' : 'left',
      reverse: cfg.reversed,
      display: showAxis,
      ticks: { color: cfg.color, font: { size: 10, family: "'DM Mono', monospace" }, maxTicksLimit: 6 },
      grid: { color: showAxis ? 'rgba(255,255,255,0.06)' : 'transparent', display: showAxis }
    };
    datasets.push({
      label: cfg.label, data,
      borderColor: cfg.color,
      backgroundColor: cfg.color + '18',
      borderWidth: 1.5, pointRadius: 0,
      yAxisID: axId, fill: cfg.fill,
      tension: 0.3, spanGaps: true,
      _unit: cfg.unit, _reversed: cfg.reversed
    });
  }

  if (!datasets.length) return;

  const canvas = document.getElementById('main-chart'); if (!canvas) return;
  if (currentChart) { currentChart.destroy(); currentChart = null; }

  const legend = document.getElementById('chart-legend');
  if (legend) legend.innerHTML = datasets.map(ds => `<div class="legend-item"><div class="legend-dot" style="background:${ds.borderColor}"></div>${ds.label}</div>`).join('');

  currentChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      onHover: (evt, elements) => { if (elements.length > 0) syncMapToChartIndex(elements[0].index); },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external(context) {
            const { chart, tooltip } = context;
            let el = chart.canvas.parentNode.querySelector('.chart-ext-tooltip');
            if (!el) {
              el = document.createElement('div'); el.className = 'chart-ext-tooltip';
              chart.canvas.parentNode.style.position = 'relative';
              chart.canvas.parentNode.appendChild(el);
            }
            if (tooltip.opacity === 0) { el.style.opacity = '0'; chart._hoverX = null; chart.update('none'); return; }
            chart._hoverX = tooltip.caretX; chart.update('none');
            const title = tooltip.title?.[0] ? `<div style="color:#888580;margin-bottom:5px;">${tooltip.title[0]} km</div>` : '';
            const lines = (tooltip.dataPoints||[]).map(dp => {
              const v = dp.parsed.y; if (v == null) return '';
              const ds = dp.dataset; const unit = ds._unit||'';
              if (ds._reversed && unit==='/km') { const m=Math.floor(v),s=Math.round((v-m)*60); return `<div style="color:${ds.borderColor}">${ds.label}: ${m}:${String(s).padStart(2,'0')} /km</div>`; }
              return `<div style="color:${ds.borderColor}">${ds.label}: ${v.toFixed(1)} ${unit}</div>`;
            }).join('');
            el.innerHTML = title+lines; el.style.opacity='1';
            const x = tooltip.caretX+14, maxL = chart.canvas.parentNode.offsetWidth - el.offsetWidth - 8;
            el.style.left = Math.min(x, maxL)+'px';
          }
        },
        crosshair: {},
        splitHighlight: {}
      },
      scales: { x: { ticks: { maxTicksLimit: 10, color: '#444240', font: { size: 10, family: "'DM Mono', monospace" } }, grid: { color: 'rgba(255,255,255,0.04)' } }, ...axes }
    }
  });
}

// ─── MAP ───
let leafletMap = null;
let mapMarker = null;
let mapPolylines = [];
let mapMode = 'hr';
let mapStreamData = null;
let mapSplitHighlight = null;

function highlightKmOnMap(km) {
  if (pinnedSplitKm !== null && pinnedSplitKm !== km) return;
  if (!leafletMap || !mapStreamData) return;
  clearKmHighlight();

  const latlng = mapStreamData.latlng?.data || [];
  const dist   = mapStreamData.distance?.data || [];
  if (latlng.length < 2) return;

  const startM = (km - 1) * 1000;
  const endM   = km * 1000;
  const pts = [];
  for (let i = 0; i < latlng.length; i++) {
    if (dist[i] >= startM && dist[i] <= endM) pts.push(latlng[i]);
  }
  if (pts.length < 2) return;

  mapSplitHighlight = L.polyline(pts, {
    color: 'white', weight: 7, opacity: 0.92,
    lineJoin: 'round', lineCap: 'round'
  }).addTo(leafletMap);

  document.querySelectorAll('.split-row').forEach(r => r.classList.remove('km-active'));
  const row = document.querySelector(`.split-row[data-km="${km}"]`);
  if (row) row.classList.add('km-active');

  chartSplitActiveKm = km;
  if (currentChart) currentChart.update('none');
}

function clearKmHighlight() {
  if (pinnedSplitKm !== null) return;
  if (mapSplitHighlight && leafletMap) {
    leafletMap.removeLayer(mapSplitHighlight);
    mapSplitHighlight = null;
  }
  document.querySelectorAll('.split-row').forEach(r => r.classList.remove('km-active'));
  chartSplitActiveKm = null;
  if (currentChart) currentChart.update('none');
}

function toggleSplitPin(km) {
  if (pinnedSplitKm === km) {
    pinnedSplitKm = null;
    clearKmHighlight();
  } else {
    pinnedSplitKm = km;
    highlightKmOnMap(km);
  }
}

function setMapMode(mode, btn) {
  document.querySelectorAll('.map-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mapMode = mode;
  if (mapStreamData) drawRoute(mapStreamData);
}

function hrColor(hr) {
  const pct = Math.min(1, Math.max(0, (hr - 120) / 80));
  if (pct < 0.25) return interpolateColor('#4ade80', '#a3e635', pct / 0.25);
  if (pct < 0.5)  return interpolateColor('#a3e635', '#fbbf24', (pct - 0.25) / 0.25);
  if (pct < 0.75) return interpolateColor('#fbbf24', '#f97316', (pct - 0.5) / 0.25);
  return interpolateColor('#f97316', '#f87171', (pct - 0.75) / 0.25);
}

function paceColor(vel) {
  const pct = Math.min(1, Math.max(0, (vel - 2.0) / 3.5));
  if (pct < 0.5) return interpolateColor('#f87171', '#fbbf24', pct / 0.5);
  return interpolateColor('#fbbf24', '#4ade80', (pct - 0.5) / 0.5);
}

function gradeColor(g) {
  const clamped = Math.min(10, Math.max(-10, g));
  if (clamped < 0) return interpolateColor('#60a5fa', '#4ade80', (clamped + 10) / 10);
  return interpolateColor('#4ade80', '#f87171', clamped / 10);
}

function interpolateColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function initMap(streams) {
  const latlng = streams.latlng?.data;
  if (!latlng || latlng.length < 2) {
    document.getElementById('map-section').style.display = 'none';
    return;
  }
  document.getElementById('map-section').style.display = 'block';
  mapStreamData = streams;

  if (leafletMap) { leafletMap.remove(); leafletMap = null; mapMarker = null; mapPolylines = []; }

  setTimeout(() => {
    const center = latlng[Math.floor(latlng.length / 2)];
    leafletMap = L.map('run-map', { zoomControl: true, attributionControl: false }).setView(center, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
    drawRoute(streams);

    const icon = L.divIcon({
      className: '',
      html: '<div style="width:12px;height:12px;border-radius:50%;background:#FC4C02;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.5);margin:-6px 0 0 -6px;"></div>',
      iconSize: [0,0]
    });
    mapMarker = L.marker(center, { icon, interactive: false }).addTo(leafletMap);
    mapMarker.setOpacity(0);
  }, 50);
}

function drawRoute(streams) {
  if (!leafletMap) return;
  const latlng = streams.latlng?.data || [];
  const hr     = streams.heartrate?.data || [];
  const vel    = streams.velocity_smooth?.data || [];
  const grade  = streams.grade_smooth?.data || [];
  const dist   = streams.distance?.data || [];
  const time   = streams.time?.data || [];
  const cad    = streams.cadence?.data || [];

  mapPolylines.forEach(p => leafletMap.removeLayer(p));
  mapPolylines = [];

  const step = Math.max(1, Math.floor(latlng.length / 600));
  for (let i = 0; i < latlng.length - step; i += step) {
    const pts = [latlng[i], latlng[i + step]];
    let color = '#FC4C02';
    if (mapMode === 'hr')    color = hr[i]    ? hrColor(hr[i])      : '#666';
    if (mapMode === 'pace')  color = vel[i]   ? paceColor(vel[i])   : '#666';
    if (mapMode === 'grade') color = grade[i] !== undefined ? gradeColor(grade[i]) : '#666';

    const pl = L.polyline(pts, { color, weight: 4, opacity: 0.9, lineJoin: 'round' });

    pl.on('mouseover', (e) => {
      const idx = i;
      const hrVal   = hr[idx]    ? Math.round(hr[idx]) + ' bpm' : '--';
      const paceVal = vel[idx] > 0 ? fmtPace(vel[idx]) + ' /km' : '--';
      const gradeVal = grade[idx] !== undefined ? grade[idx].toFixed(1) + '%' : '--';
      const distVal = dist[idx] ? (dist[idx]/1000).toFixed(2) + ' km' : '--';
      const cadVal  = cad[idx] ? (cad[idx]*2) + ' spm' : '--';

      pl.bindTooltip(
        `<div class="map-tooltip"><strong>${distVal}</strong><br>HR: ${hrVal}<br>Pace: ${paceVal}<br>Grade: ${gradeVal}<br>Cadence: ${cadVal}</div>`,
        { permanent: false, sticky: true, className: 'map-tooltip-wrap', offset: [10, 0] }
      ).openTooltip();

      if (mapMarker) { mapMarker.setLatLng(latlng[idx]); mapMarker.setOpacity(1); }
      syncChartToIndex(idx);
    });

    pl.on('mouseout', () => { if (mapMarker) mapMarker.setOpacity(0); });
    pl.addTo(leafletMap);
    mapPolylines.push(pl);
  }

  const startIcon = L.divIcon({ className: '', html: '<div style="background:#4ade80;color:#052e16;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;font-family:DM Mono,monospace;">START</div>', iconSize: [0,0] });
  const endIcon   = L.divIcon({ className: '', html: '<div style="background:#f87171;color:#450a0a;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;font-family:DM Mono,monospace;">END</div>', iconSize: [0,0] });
  L.marker(latlng[0], { icon: startIcon, interactive: false }).addTo(leafletMap);
  L.marker(latlng[latlng.length-1], { icon: endIcon, interactive: false }).addTo(leafletMap);

  leafletMap.fitBounds(L.polyline(latlng).getBounds(), { padding: [20, 20] });

  const legends = {
    hr:    { low: 'Low HR', high: 'High HR', labelLow: '~120bpm', labelHigh: '~200bpm' },
    pace:  { low: 'Slow',   high: 'Fast',    labelLow: '6:40/km', labelHigh: '3:20/km' },
    grade: { low: 'Downhill', high: 'Uphill', labelLow: '-10%', labelHigh: '+10%' }
  };
  const leg = legends[mapMode] || legends.hr;
  document.getElementById('map-legend-low').textContent  = leg.low;
  document.getElementById('map-legend-high').textContent = leg.high;
  document.getElementById('map-label-low').textContent   = leg.labelLow;
  document.getElementById('map-label-high').textContent  = leg.labelHigh;
}

function syncChartToIndex(rawIdx) {
  if (!currentChart) return;
  const streams = streamData;
  if (!streams) return;
  const dist = streams.distance?.data || [];
  const N = dist.length;
  const step = Math.max(1, Math.floor(N / 400));
  const chartIdx = Math.round(rawIdx / step);
  const meta = currentChart.getDatasetMeta(0);
  if (!meta || !meta.data || chartIdx >= meta.data.length) return;
  currentChart.tooltip.setActiveElements(
    [{ datasetIndex: 0, index: chartIdx }, { datasetIndex: 1, index: chartIdx }],
    { x: 0, y: 0 }
  );
  currentChart.update('none');
}

function syncMapToChartIndex(chartIdx) {
  if (!leafletMap || !mapMarker || !streamData) return;
  const latlng = streamData.latlng?.data;
  const dist   = streamData.distance?.data || [];
  if (!latlng) return;
  const N = dist.length;
  const step = Math.max(1, Math.floor(N / 400));
  const rawIdx = Math.min(latlng.length - 1, chartIdx * step);
  if (latlng[rawIdx]) { mapMarker.setLatLng(latlng[rawIdx]); mapMarker.setOpacity(1); }
}

// ─── ZONES ───
function calcZones(hrData, timeData) {
  if (!hrData.length) return [];
  const b = customZoneBounds || { z12: 120, z23: 148, z34: 162, z45: 174 };
  const zones = [
    { name: 'Z1', min: 0,     max: b.z12, color: '#1d9e75', secs: 0 },
    { name: 'Z2', min: b.z12, max: b.z23, color: '#4ade80', secs: 0 },
    { name: 'Z3', min: b.z23, max: b.z34, color: '#fbbf24', secs: 0 },
    { name: 'Z4', min: b.z34, max: b.z45, color: '#f97316', secs: 0 },
    { name: 'Z5', min: b.z45, max: 999,   color: '#f87171', secs: 0 }
  ];
  hrData.forEach((h, i) => {
    const dt = i > 0 ? timeData[i] - timeData[i-1] : 1;
    for (let z = zones.length-1; z >= 0; z--) { if (h >= zones[z].min) { zones[z].secs += dt; break; } }
  });
  const total = zones.reduce((s,z) => s+z.secs, 0) || 1;
  return zones.map(z => ({ ...z, pct: Math.round(z.secs/total*100) })).filter(z => z.pct > 0);
}

function toggleZoneEditor() {
  const el = document.getElementById('zone-editor');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function saveZoneBounds() {
  const bounds = { z12: +document.getElementById('zb_z12').value, z23: +document.getElementById('zb_z23').value, z34: +document.getElementById('zb_z34').value, z45: +document.getElementById('zb_z45').value };
  customZoneBounds = bounds;
  localStorage.setItem('tl_zone_bounds', JSON.stringify(bounds));
  if (currentActivity && streamData) renderDetail(currentActivity, streamData);
}

function resetZoneBounds() {
  customZoneBounds = null;
  localStorage.removeItem('tl_zone_bounds');
  if (currentActivity && streamData) renderDetail(currentActivity, streamData);
}

// ─── SPIKES ───
function detectSpikes(hrData, velData, altData, timeData, distData, gradeData) {
  const spikes = [];
  if (!hrData.length && !velData.length) return spikes;

  const avgHR  = avg(hrData);
  const avgVel = avg(velData.filter(v=>v>0));

  if (hrData.length) {
    const maxHR = Math.max(...hrData);
    const idx = hrData.lastIndexOf(maxHR);
    const km = distData[idx] ? (distData[idx]/1000).toFixed(2) : null;
    spikes.push({
      icon: '↑', bgColor: 'rgba(248,113,113,0.15)',
      title: `Peak HR: ${maxHR} bpm`,
      detail: `${Math.round(maxHR - avgHR)} bpm above average${altData[idx] ? ` · ${Math.round(altData[idx])}m elevation` : ''}`,
      at: km ? km + 'km' : fmtTime(timeData[idx])
    });
  }

  if (velData.length) {
    let slowIdx = 0, slowVal = Infinity;
    velData.forEach((v,i) => { if (v > 0.5 && v < slowVal) { slowVal = v; slowIdx = i; } });
    if (slowVal < avgVel * 0.75) {
      const km = distData[slowIdx] ? (distData[slowIdx]/1000).toFixed(2) : null;
      spikes.push({
        icon: '↓', bgColor: 'rgba(96,165,250,0.15)',
        title: `Slowest point: ${fmtPace(slowVal)} /km`,
        detail: `Avg pace ${fmtPace(avgVel)} · ${Math.round((1-slowVal/avgVel)*100)}% below average${altData[slowIdx] ? ` · ${Math.round(altData[slowIdx])}m elev` : ''}`,
        at: km ? km + 'km' : fmtTime(timeData[slowIdx])
      });
    }

    let fastIdx = 0, fastVal = 0;
    velData.forEach((v,i) => { if (v > fastVal) { fastVal = v; fastIdx = i; } });
    if (fastVal > avgVel * 1.15) {
      const km = distData[fastIdx] ? (distData[fastIdx]/1000).toFixed(2) : null;
      spikes.push({
        icon: '⚡', bgColor: 'rgba(74,222,128,0.15)',
        title: `Fastest point: ${fmtPace(fastVal)} /km`,
        detail: `${Math.round((fastVal/avgVel-1)*100)}% faster than average`,
        at: km ? km + 'km' : fmtTime(timeData[fastIdx])
      });
    }
  }

  if (altData.length > 1) {
    let steepIdx = 1, steepVal = 0;
    for (let i = 5; i < altData.length - 5; i++) {
      const gain = altData[i+4] - altData[i-4];
      if (gain > steepVal) { steepVal = gain; steepIdx = i; }
    }
    if (steepVal > 5) {
      const km = distData[steepIdx] ? (distData[steepIdx]/1000).toFixed(2) : null;
      spikes.push({
        icon: '⛰', bgColor: 'rgba(251,191,36,0.15)',
        title: `Steepest climb: +${steepVal.toFixed(1)}m`,
        detail: `HR at this point: ${hrData[steepIdx] ? Math.round(hrData[steepIdx]) + ' bpm' : 'N/A'}`,
        at: km ? km + 'km' : fmtTime(timeData[steepIdx])
      });
    }
  }

  return spikes;
}

// ─── SPLITS TABLE ───
function buildSplitsTable(hrData, velData, altData, distData, timeData, cadData) {
  if (!distData.length) return [];
  const totalKm = Math.floor(distData[distData.length-1] / 1000);
  if (totalKm < 1) return [];

  const splits = [];
  const allPaces = [];

  for (let km = 1; km <= totalKm; km++) {
    const startM = (km-1) * 1000, endM = km * 1000;
    const idxs = distData.reduce((acc,d,i) => d >= startM && d < endM ? [...acc,i] : acc, []);
    if (!idxs.length) continue;

    const segHR  = idxs.map(i => hrData[i]).filter(Boolean);
    const segVel = idxs.map(i => velData[i]).filter(v => v > 0);
    const segAlt = idxs.map(i => altData[i]).filter(v => v !== undefined);
    const segCad = cadData ? idxs.map(i => cadData[i]).filter(v => v > 0) : [];

    const paceVal  = segVel.length ? avg(segVel) : 0;
    const hrVal    = segHR.length  ? Math.round(avg(segHR)) : null;
    const elevDiff = segAlt.length > 1 ? Math.round(segAlt[segAlt.length-1] - segAlt[0]) : null;
    const cadVal   = segCad.length ? Math.round(avg(segCad) * 2) : null;

    allPaces.push(paceVal);
    splits.push({ km, paceVal, hrVal, elevDiff, cadVal });
  }

  const avgPaceVal = avg(allPaces.filter(v=>v>0));

  return splits.map(s => ({
    km: s.km,
    pace: fmtPace(s.paceVal),
    paceClass: s.paceVal > avgPaceVal * 1.05 ? 'pace-slow' : s.paceVal < avgPaceVal * 0.95 ? 'pace-fast' : '',
    hr: s.hrVal ? s.hrVal + ' bpm' : '--',
    hrClass: s.hrVal > 170 ? 'hr-high' : s.hrVal > 155 ? 'hr-med' : '',
    elev: s.elevDiff !== null ? (s.elevDiff >= 0 ? '+' : '') + s.elevDiff + 'm' : '--',
    cad: s.cadVal ? s.cadVal + ' spm' : '--'
  }));
}

// ─── WHOOP ───

function updateWhoopBtn() {
  const btn = document.getElementById('whoop-btn');
  if (!btn) return;
  const tok = getWhoopToken();
  if (tok) {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:13px;height:13px;"><circle cx="12" cy="12" r="10"/><path fill="none" stroke="white" stroke-width="2.5" d="M7 12l4 4 6-7"/></svg> Whoop Connected`;
    btn.classList.add('connected');
    btn.setAttribute('onclick', 'promptWhoopDisconnect()');
  } else {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:13px;height:13px;"><circle cx="12" cy="12" r="10"/><path fill="none" stroke="white" stroke-width="2.5" d="M7 12l4 4 6-7"/></svg> Connect Whoop`;
    btn.classList.remove('connected');
    btn.setAttribute('onclick', 'connectWhoop()');
  }
}

function connectWhoop() {
  const scope = 'offline read:recovery read:sleep read:cycles read:body_measurement read:workout';
  const nonce = Math.random().toString(36).slice(2, 10);
  const state = `whoopauth_${nonce}`;
  const params = new URLSearchParams({
    client_id: WHOOP_CLIENT_ID,
    redirect_uri: WHOOP_REDIRECT_URI,
    response_type: 'code',
    scope,
    state
  });
  try { sessionStorage.setItem('whoop_oauth_pending', '1'); } catch(e) {}
  window.location.href = `https://api.prod.whoop.com/oauth/oauth2/auth?${params.toString()}`;
}

function promptWhoopDisconnect() {
  if (confirm('Disconnect Whoop from this device?')) {
    clearWhoopToken();
    whoopData = null;
    updateWhoopBtn();
    renderWhoopSection();
  }
}

function showWhoopError(msg) {
  // Mark the button red so the error is obvious in the topbar
  const btn = document.getElementById('whoop-btn');
  if (btn) {
    btn.style.borderColor = 'var(--red)';
    btn.style.color = 'var(--red)';
  }
  // Inject a dismissable banner into the main panel
  const main = document.getElementById('main-panel');
  if (!main) return;
  const existing = document.getElementById('whoop-error-banner');
  if (existing) existing.remove();
  const banner = document.createElement('div');
  banner.id = 'whoop-error-banner';
  banner.style.cssText = 'margin:16px 24px 0;padding:12px 16px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);border-radius:8px;font-size:13px;color:var(--red);display:flex;justify-content:space-between;align-items:center;gap:12px;';
  banner.innerHTML = `<span>Whoop connection failed: <strong>${escapeHtml(msg)}</strong> — check your Netlify environment variables are saved and the site has been redeployed.</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;">×</button>`;
  main.prepend(banner);
}

async function exchangeWhoopCode(code) {
  const r = await fetch('/.netlify/functions/whoop-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code })
  });
  const d = await r.json();
  if (d.access_token) return d;
  throw new Error(d.error || `Token exchange failed (HTTP ${r.status})`);
}

function renderWhoopSection() {
  const section = document.getElementById('whoop-section');
  if (!section) return;

  const tok = getWhoopToken();
  if (!tok) {
    const errHtml = whoopConnectError
      ? `<div class="error-banner" style="margin-bottom:10px;">Last connection attempt failed: <strong>${escapeHtml(whoopConnectError)}</strong><br>Check your Netlify environment variables (WHOOP_CLIENT_ID, WHOOP_CLIENT_SECRET, WHOOP_REDIRECT_URI) are set and the site has been redeployed.</div>`
      : '';
    section.innerHTML = `
      <div class="section-head">Whoop Recovery</div>
      ${errHtml}
      <div class="whoop-not-connected">
        <a href="#" onclick="connectWhoop(); return false;">Connect your Whoop account</a> to pull recovery data alongside this session.
      </div>`;
    return;
  }

  if (whoopData) {
    renderWhoopData(whoopData);
    return;
  }

  section.innerHTML = `
    <div class="section-head">Whoop Recovery</div>
    <div class="loading-state"><div class="spinner" style="border-top-color:var(--whoop);"></div> Fetching Whoop data…</div>`;

  fetchWhoopData();
}

async function fetchWhoopData() {
  const section = document.getElementById('whoop-section');
  const tok = getWhoopToken();
  if (!tok || !section) return;

  try {
    const payload = { ...tok };
    // Use UTC start_date (has Z suffix) so server-side comparison with Whoop UTC times is accurate
    if (currentActivity?.start_date || currentActivity?.start_date_local) {
      payload.activity_start = currentActivity.start_date || currentActivity.start_date_local;
    }
    if (currentActivity?.start_date && currentActivity?.elapsed_time) {
      const endMs = new Date(currentActivity.start_date).getTime() + currentActivity.elapsed_time * 1000;
      payload.activity_end = new Date(endMs).toISOString();
    }

    const resp = await fetch('/.netlify/functions/whoop-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();

    if (resp.status === 401) {
      clearWhoopToken();
      updateWhoopBtn();
      section.innerHTML = `
        <div class="section-head">Whoop Recovery</div>
        <div class="error-banner">Whoop session expired. <a href="#" onclick="connectWhoop(); return false;" style="color:inherit;text-decoration:underline;">Reconnect</a></div>`;
      return;
    }

    if (!resp.ok) {
      section.innerHTML = `
        <div class="section-head">Whoop Recovery</div>
        <div class="error-banner">${escapeHtml(data.error || 'Failed to fetch Whoop data')}</div>`;
      return;
    }

    if (data.new_token) saveWhoopToken(data.new_token);
    whoopData = data;
    renderWhoopData(data);
  } catch (e) {
    if (section) section.innerHTML = `
      <div class="section-head">Whoop Recovery</div>
      <div class="error-banner">Network error: ${escapeHtml(e.message)}</div>`;
  }
}

function whoopSubHead(label) {
  return `<div style="font-size:10px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--whoop);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);">${label}</div>`;
}

function renderWhoopData(data) {
  const section = document.getElementById('whoop-section');
  if (!section) return;

  const parts = [];
  const rec  = data.recovery;
  const sl   = data.sleep;
  const cy   = data.cycle;
  const psl  = data.post_sleep;
  const prec = data.post_recovery;
  const wo   = data.workout;

  // Show any API errors so we can debug scope/auth issues
  if (data._errors) {
    const errLines = Object.entries(data._errors).map(([k, v]) => `<b>${escapeHtml(k)}</b>: ${escapeHtml(v)}`).join('<br>');
    parts.push(`<div class="error-banner" style="margin-bottom:10px;font-size:11px;">Whoop API errors (some data unavailable):<br>${errLines}</div>`);
  }

  // ── Night Before: Recovery ────────────────────────────────────────────────
  if (rec) {
    const score = rec.score;
    const rc = score >= 67 ? 'var(--green)' : score >= 34 ? 'var(--amber)' : 'var(--red)';
    const cards = [];

    if (score != null) {
      cards.push(`<div class="metric" style="border-color:${rc}33;background:${rc}18;"><div class="metric-val" style="color:${rc};">${score}%</div><div class="metric-lbl">Recovery · ${rec.state}</div></div>`);
    } else {
      cards.push(`<div class="metric"><div class="metric-val">--</div><div class="metric-lbl">Recovery · ${rec.state || 'N/A'}</div></div>`);
    }
    if (rec.hrv_rmssd  != null) cards.push(`<div class="metric"><div class="metric-val">${Math.round(rec.hrv_rmssd)}</div><div class="metric-lbl">HRV (ms)</div></div>`);
    if (rec.resting_hr != null) cards.push(`<div class="metric"><div class="metric-val">${rec.resting_hr}</div><div class="metric-lbl">Resting HR</div></div>`);
    if (rec.spo2       != null) cards.push(`<div class="metric"><div class="metric-val">${rec.spo2.toFixed(1)}%</div><div class="metric-lbl">SpO2</div></div>`);
    if (rec.skin_temp  != null) cards.push(`<div class="metric"><div class="metric-val">${rec.skin_temp.toFixed(1)}°C</div><div class="metric-lbl">Skin temp</div></div>`);

    parts.push(`<div style="margin-bottom:22px;">${whoopSubHead('Night Before · Recovery')}<div class="metrics-grid" style="margin-bottom:0;">${cards.join('')}</div></div>`);
  }

  // ── Night Before: Sleep ───────────────────────────────────────────────────
  if (sl) {
    const scored      = sl.score_state === 'SCORED';
    const asleepMs    = ((sl.in_bed_milli || 0) - (sl.awake_milli || 0));
    const inBed       = sl.in_bed_milli || 1;
    const deepPct     = Math.round((sl.deep_milli  || 0) / inBed * 100);
    const remPct      = Math.round((sl.rem_milli   || 0) / inBed * 100);
    const lightPct    = Math.round((sl.light_milli || 0) / inBed * 100);
    const awakePct    = Math.round((sl.awake_milli || 0) / inBed * 100);
    const sleepWindow = `${fmtClockFromIso(sl.start)} → ${fmtClockFromIso(sl.end)}`;

    const stages = [
      { name: 'Deep',  pct: deepPct,  ms: sl.deep_milli,  color: '#818cf8' },
      { name: 'REM',   pct: remPct,   ms: sl.rem_milli,   color: '#60a5fa' },
      { name: 'Light', pct: lightPct, ms: sl.light_milli, color: '#4ade80' },
      { name: 'Awake', pct: awakePct, ms: sl.awake_milli, color: '#f87171' }
    ].filter(s => (s.ms || 0) > 0);

    const topCards = [];
    if (sl.in_bed_milli != null) topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(sl.in_bed_milli)}</div><div class="metric-lbl">Time in bed</div></div>`);
    if (asleepMs > 0)            topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(asleepMs)}</div><div class="metric-lbl">Time asleep</div></div>`);
    if (sl.needed_milli != null) topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(sl.needed_milli)}</div><div class="metric-lbl">Sleep needed</div></div>`);
    if (sl.performance  != null) topCards.push(`<div class="metric"><div class="metric-val">${sl.performance}%</div><div class="metric-lbl">Performance</div></div>`);
    if (sl.efficiency   != null) topCards.push(`<div class="metric"><div class="metric-val">${Math.round(sl.efficiency)}%</div><div class="metric-lbl">Efficiency</div></div>`);
    if (sl.consistency  != null) topCards.push(`<div class="metric"><div class="metric-val">${sl.consistency}%</div><div class="metric-lbl">Consistency</div></div>`);
    if (sl.respiratory_rate != null) topCards.push(`<div class="metric"><div class="metric-val">${sl.respiratory_rate.toFixed(1)}</div><div class="metric-lbl">Resp rate (br/m)</div></div>`);
    if (sl.disturbances != null) topCards.push(`<div class="metric"><div class="metric-val">${sl.disturbances}</div><div class="metric-lbl">Disturbances</div></div>`);
    if (sl.cycles       != null) topCards.push(`<div class="metric"><div class="metric-val">${sl.cycles}</div><div class="metric-lbl">Sleep cycles</div></div>`);

    // Sleep needed breakdown
    let neededBreakdown = '';
    if (sl.needed_milli != null && (sl.needed_baseline || sl.needed_strain || sl.needed_debt)) {
      const rows = [];
      if (sl.needed_baseline != null) rows.push(`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span>Baseline need</span><span style="font-family:var(--mono);">${fmtMs(sl.needed_baseline)}</span></div>`);
      if (sl.needed_strain   != null && sl.needed_strain   !== 0) rows.push(`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span>+ Recent strain</span><span style="font-family:var(--mono);color:var(--amber);">${sl.needed_strain > 0 ? '+' : ''}${fmtMs(Math.abs(sl.needed_strain))}</span></div>`);
      if (sl.needed_debt     != null && sl.needed_debt     !== 0) rows.push(`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span>+ Sleep debt</span><span style="font-family:var(--mono);color:var(--red);">${sl.needed_debt > 0 ? '+' : ''}${fmtMs(Math.abs(sl.needed_debt))}</span></div>`);
      if (sl.needed_nap      != null && sl.needed_nap      !== 0) rows.push(`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span>+ Nap credit</span><span style="font-family:var(--mono);color:var(--green);">${sl.needed_nap > 0 ? '+' : ''}${fmtMs(Math.abs(sl.needed_nap))}</span></div>`);
      if (rows.length) {
        neededBreakdown = `
          <div style="margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--muted);">
            <div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;">Sleep debt breakdown</div>
            ${rows.join('')}
            <div style="display:flex;justify-content:space-between;padding:4px 0;font-weight:600;color:var(--text);"><span>Total needed</span><span style="font-family:var(--mono);">${fmtMs(sl.needed_milli)}</span></div>
          </div>`;
      }
    }

    const stageHtml = stages.length ? `
      <div class="chart-box" style="padding:12px 16px;margin-top:14px;">
        ${stages.map(s => `
          <div class="zone-row">
            <span class="zone-name" style="color:${s.color};width:44px;">${s.name}</span>
            <div class="zone-track"><div class="zone-fill" style="width:${s.pct}%;background:${s.color};"></div></div>
            <span class="zone-pct">${s.pct}%</span>
            <span class="zone-time">${fmtMs(s.ms)}</span>
          </div>`).join('')}
      </div>` : '';

    const unscored = !scored ? `<div class="error-banner" style="margin-bottom:10px;font-size:11px;">Sleep ${sl.score_state || 'not yet scored'} — detailed metrics unavailable</div>` : '';

    parts.push(`
      <div style="margin-bottom:22px;">
        ${whoopSubHead(`Night Before · Sleep &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);">${sleepWindow}</span>`)}
        ${unscored}
        ${topCards.length ? `<div class="metrics-grid" style="margin-bottom:0;">${topCards.join('')}</div>` : ''}
        ${neededBreakdown}
        ${stageHtml}
      </div>`);
  }

  // ── Workout Load ──────────────────────────────────────────────────────────
  if (wo) {
    const scored  = wo.score_state === 'SCORED';
    const sc      = wo.strain;
    const scc     = sc >= 18 ? 'var(--red)' : sc >= 14 ? 'var(--amber)' : sc >= 10 ? 'var(--green)' : 'var(--muted)';
    const strainLabel = sc >= 18 ? 'All Out' : sc >= 14 ? 'Strenuous' : sc >= 10 ? 'Moderate' : 'Light';
    const kcal    = wo.kilojoule ? Math.round(wo.kilojoule / 4.184) : null;
    const distKm  = wo.distance_meter ? (wo.distance_meter / 1000).toFixed(2) : null;
    const altGain = wo.altitude_gain  ? Math.round(wo.altitude_gain) : null;
    const unscored = !scored ? `<div class="error-banner" style="margin-bottom:10px;font-size:11px;">Workout ${wo.score_state || 'not yet scored'}</div>` : '';

    const topCards = [];
    if (sc        != null) topCards.push(`<div class="metric" style="border-color:${scc}33;background:${scc}18;"><div class="metric-val" style="color:${scc};">${sc.toFixed(1)}</div><div class="metric-lbl">Workout strain · ${strainLabel}</div></div>`);
    if (wo.avg_hr != null) topCards.push(`<div class="metric"><div class="metric-val">${Math.round(wo.avg_hr)}</div><div class="metric-lbl">Avg HR (workout)</div></div>`);
    if (wo.max_hr != null) topCards.push(`<div class="metric"><div class="metric-val">${Math.round(wo.max_hr)}</div><div class="metric-lbl">Max HR (workout)</div></div>`);
    if (kcal)              topCards.push(`<div class="metric"><div class="metric-val">${kcal}</div><div class="metric-lbl">Calories (workout)</div></div>`);
    if (distKm)            topCards.push(`<div class="metric"><div class="metric-val">${distKm} km</div><div class="metric-lbl">Distance (Whoop)</div></div>`);
    if (altGain)           topCards.push(`<div class="metric"><div class="metric-val">${altGain} m</div><div class="metric-lbl">Elevation gain</div></div>`);
    if (wo.percent_recorded != null) topCards.push(`<div class="metric"><div class="metric-val">${wo.percent_recorded}%</div><div class="metric-lbl">Data recorded</div></div>`);

    const zoneData = [
      { name: 'Z5 Max',     ms: wo.zone_five_milli,  color: '#ef4444' },
      { name: 'Z4 Hard',    ms: wo.zone_four_milli,  color: '#f97316' },
      { name: 'Z3 Tempo',   ms: wo.zone_three_milli, color: '#fbbf24' },
      { name: 'Z2 Aerobic', ms: wo.zone_two_milli,   color: '#4ade80' },
      { name: 'Z1 Light',   ms: wo.zone_one_milli,   color: '#60a5fa' },
      { name: 'Z0 Rest',    ms: wo.zone_zero_milli,  color: '#94a3b8' }
    ].filter(z => (z.ms || 0) > 0);

    const totalZoneMs = zoneData.reduce((s, z) => s + (z.ms || 0), 0) || 1;
    const zoneHtml = zoneData.length ? `
      <div class="chart-box" style="padding:12px 16px;margin-top:14px;">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;">HR zones (% of max HR)</div>
        ${zoneData.map(z => {
          const pct = Math.round((z.ms / totalZoneMs) * 100);
          return `<div class="zone-row">
            <span class="zone-name" style="color:${z.color};width:72px;">${z.name}</span>
            <div class="zone-track"><div class="zone-fill" style="width:${pct}%;background:${z.color};"></div></div>
            <span class="zone-pct">${pct}%</span>
            <span class="zone-time">${fmtMs(z.ms)}</span>
          </div>`;
        }).join('')}
      </div>` : '';

    const sportLabel = wo.sport_name ? ` · <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);">${escapeHtml(wo.sport_name)}</span>` : '';
    parts.push(`
      <div style="margin-bottom:22px;">
        ${whoopSubHead(`Workout Load${sportLabel}`)}
        ${unscored}
        ${topCards.length ? `<div class="metrics-grid" style="margin-bottom:0;">${topCards.join('')}</div>` : ''}
        ${zoneHtml}
      </div>`);
  }

  // ── Day Total: Strain ─────────────────────────────────────────────────────
  if (cy) {
    const sc  = cy.strain;
    const scc = sc >= 18 ? 'var(--red)' : sc >= 10 ? 'var(--amber)' : 'var(--green)';
    const kcal = cy.kilojoule ? Math.round(cy.kilojoule / 4.184) : null;
    const cards = [];
    if (sc        != null) cards.push(`<div class="metric" style="border-color:${scc}33;background:${scc}18;"><div class="metric-val" style="color:${scc};">${sc.toFixed(1)}</div><div class="metric-lbl">Day strain (total)</div></div>`);
    if (cy.avg_hr != null) cards.push(`<div class="metric"><div class="metric-val">${Math.round(cy.avg_hr)}</div><div class="metric-lbl">Avg HR (full day)</div></div>`);
    if (cy.max_hr != null) cards.push(`<div class="metric"><div class="metric-val">${Math.round(cy.max_hr)}</div><div class="metric-lbl">Max HR (full day)</div></div>`);
    if (kcal)               cards.push(`<div class="metric"><div class="metric-val">${kcal}</div><div class="metric-lbl">Calories (full day)</div></div>`);
    parts.push(`<div style="margin-bottom:22px;">${whoopSubHead('Day Total · Strain')}<div class="metrics-grid" style="margin-bottom:0;">${cards.join('')}</div></div>`);
  }

  // ── Next Night: Sleep (post-activity) ────────────────────────────────────
  if (psl) {
    const scored      = psl.score_state === 'SCORED';
    const asleepMs    = ((psl.in_bed_milli || 0) - (psl.awake_milli || 0));
    const inBed       = psl.in_bed_milli || 1;
    const deepPct     = Math.round((psl.deep_milli  || 0) / inBed * 100);
    const remPct      = Math.round((psl.rem_milli   || 0) / inBed * 100);
    const lightPct    = Math.round((psl.light_milli || 0) / inBed * 100);
    const awakePct    = Math.round((psl.awake_milli || 0) / inBed * 100);
    const sleepWindow = `${fmtClockFromIso(psl.start)} → ${fmtClockFromIso(psl.end)}`;

    const stages = [
      { name: 'Deep',  pct: deepPct,  ms: psl.deep_milli,  color: '#818cf8' },
      { name: 'REM',   pct: remPct,   ms: psl.rem_milli,   color: '#60a5fa' },
      { name: 'Light', pct: lightPct, ms: psl.light_milli, color: '#4ade80' },
      { name: 'Awake', pct: awakePct, ms: psl.awake_milli, color: '#f87171' }
    ].filter(s => (s.ms || 0) > 0);

    const topCards = [];
    if (psl.in_bed_milli != null) topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(psl.in_bed_milli)}</div><div class="metric-lbl">Time in bed</div></div>`);
    if (asleepMs > 0)             topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(asleepMs)}</div><div class="metric-lbl">Time asleep</div></div>`);
    if (psl.needed_milli != null) topCards.push(`<div class="metric"><div class="metric-val">${fmtMs(psl.needed_milli)}</div><div class="metric-lbl">Sleep needed</div></div>`);
    if (psl.performance  != null) topCards.push(`<div class="metric"><div class="metric-val">${psl.performance}%</div><div class="metric-lbl">Performance</div></div>`);
    if (psl.efficiency   != null) topCards.push(`<div class="metric"><div class="metric-val">${Math.round(psl.efficiency)}%</div><div class="metric-lbl">Efficiency</div></div>`);
    if (psl.consistency  != null) topCards.push(`<div class="metric"><div class="metric-val">${psl.consistency}%</div><div class="metric-lbl">Consistency</div></div>`);
    if (psl.respiratory_rate != null) topCards.push(`<div class="metric"><div class="metric-val">${psl.respiratory_rate.toFixed(1)}</div><div class="metric-lbl">Resp rate (br/m)</div></div>`);
    if (psl.disturbances != null) topCards.push(`<div class="metric"><div class="metric-val">${psl.disturbances}</div><div class="metric-lbl">Disturbances</div></div>`);
    if (psl.cycles       != null) topCards.push(`<div class="metric"><div class="metric-val">${psl.cycles}</div><div class="metric-lbl">Sleep cycles</div></div>`);

    const stageHtml = stages.length ? `
      <div class="chart-box" style="padding:12px 16px;margin-top:14px;">
        ${stages.map(s => `
          <div class="zone-row">
            <span class="zone-name" style="color:${s.color};width:44px;">${s.name}</span>
            <div class="zone-track"><div class="zone-fill" style="width:${s.pct}%;background:${s.color};"></div></div>
            <span class="zone-pct">${s.pct}%</span>
            <span class="zone-time">${fmtMs(s.ms)}</span>
          </div>`).join('')}
      </div>` : '';

    const unscored = !scored ? `<div class="error-banner" style="margin-bottom:10px;font-size:11px;">Sleep ${psl.score_state || 'not yet scored'} — detailed metrics unavailable</div>` : '';

    parts.push(`
      <div style="margin-bottom:22px;">
        ${whoopSubHead(`Next Night · Sleep &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);">${sleepWindow}</span>`)}
        ${unscored}
        ${topCards.length ? `<div class="metrics-grid" style="margin-bottom:0;">${topCards.join('')}</div>` : ''}
        ${stageHtml}
      </div>`);
  }

  // ── Next Morning: Recovery (post-activity) ────────────────────────────────
  if (prec) {
    const score = prec.score;
    const rc = score >= 67 ? 'var(--green)' : score >= 34 ? 'var(--amber)' : 'var(--red)';
    const cards = [];
    if (score != null) {
      cards.push(`<div class="metric" style="border-color:${rc}33;background:${rc}18;"><div class="metric-val" style="color:${rc};">${score}%</div><div class="metric-lbl">Recovery · ${prec.state}</div></div>`);
    } else {
      cards.push(`<div class="metric"><div class="metric-val">--</div><div class="metric-lbl">Recovery · ${prec.state || 'N/A'}</div></div>`);
    }
    if (prec.hrv_rmssd  != null) cards.push(`<div class="metric"><div class="metric-val">${Math.round(prec.hrv_rmssd)}</div><div class="metric-lbl">HRV (ms)</div></div>`);
    if (prec.resting_hr != null) cards.push(`<div class="metric"><div class="metric-val">${prec.resting_hr}</div><div class="metric-lbl">Resting HR</div></div>`);
    if (prec.spo2       != null) cards.push(`<div class="metric"><div class="metric-val">${prec.spo2.toFixed(1)}%</div><div class="metric-lbl">SpO2</div></div>`);
    if (prec.skin_temp  != null) cards.push(`<div class="metric"><div class="metric-val">${prec.skin_temp.toFixed(1)}°C</div><div class="metric-lbl">Skin temp</div></div>`);
    parts.push(`<div style="margin-bottom:22px;">${whoopSubHead('Next Morning · Recovery')}<div class="metrics-grid" style="margin-bottom:0;">${cards.join('')}</div></div>`);
  }

  // ── Body measurements ─────────────────────────────────────────────────────
  const bm = data.body;
  if (bm && (bm.max_heart_rate || bm.weight_kilogram || bm.height_meter)) {
    const cards = [];
    if (bm.max_heart_rate  != null) cards.push(`<div class="metric"><div class="metric-val">${bm.max_heart_rate}</div><div class="metric-lbl">Max HR (Whoop)</div></div>`);
    if (bm.weight_kilogram != null) cards.push(`<div class="metric"><div class="metric-val">${bm.weight_kilogram.toFixed(1)} kg</div><div class="metric-lbl">Weight</div></div>`);
    if (bm.height_meter    != null) cards.push(`<div class="metric"><div class="metric-val">${Math.round(bm.height_meter * 100)} cm</div><div class="metric-lbl">Height</div></div>`);
    if (cards.length) parts.push(`<div style="margin-bottom:14px;">${whoopSubHead('Body Measurements')}<div class="metrics-grid" style="margin-bottom:0;">${cards.join('')}</div></div>`);
  }

  const refreshBtn = `<button onclick="whoopData=null;renderWhoopSection();" style="background:none;border:1px solid var(--border);color:var(--faint);padding:5px 12px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;" onmouseover="this.style.borderColor='var(--whoop)';this.style.color='var(--whoop)';" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--faint)';">Refresh</button>`;

  section.innerHTML = `<div class="section-head">Whoop Health</div>${parts.join('')}${refreshBtn}`;
}

function formatWhoopForClipboard(d) {
  const lines = ['\n\nWHOOP HEALTH'];
  const rec  = d.recovery;
  const sl   = d.sleep;
  const cy   = d.cycle;
  const psl  = d.post_sleep;
  const prec = d.post_recovery;
  const wo   = d.workout;

  if (rec) {
    lines.push('\nNIGHT BEFORE — RECOVERY');
    if (rec.score != null) lines.push(`Recovery score:     ${rec.score}% (${rec.state})`);
    else lines.push(`Recovery:           ${rec.state || 'N/A'}`);
    if (rec.hrv_rmssd  != null) lines.push(`HRV (RMSSD):        ${Math.round(rec.hrv_rmssd)} ms`);
    if (rec.resting_hr != null) lines.push(`Resting HR:         ${rec.resting_hr} bpm`);
    if (rec.spo2       != null) lines.push(`SpO2:               ${rec.spo2.toFixed(1)}%`);
    if (rec.skin_temp  != null) lines.push(`Skin temp:          ${rec.skin_temp.toFixed(1)}°C`);
  }

  if (sl) {
    const asleepMs = (sl.in_bed_milli || 0) - (sl.awake_milli || 0);
    lines.push('\nNIGHT BEFORE — SLEEP');
    lines.push(`Sleep window:       ${fmtClockFromIso(sl.start)} → ${fmtClockFromIso(sl.end)}`);
    lines.push(`Score state:        ${sl.score_state || 'unknown'}`);
    if (sl.in_bed_milli != null) lines.push(`Time in bed:        ${fmtMs(sl.in_bed_milli)}`);
    if (asleepMs > 0)            lines.push(`Time asleep:        ${fmtMs(asleepMs)}`);
    if (sl.needed_milli != null) {
      lines.push(`Sleep needed:       ${fmtMs(sl.needed_milli)}`);
      if (sl.needed_baseline != null) lines.push(`  Baseline:         ${fmtMs(sl.needed_baseline)}`);
      if (sl.needed_strain   != null && sl.needed_strain !== 0) lines.push(`  + Strain:         ${sl.needed_strain > 0 ? '+' : ''}${fmtMs(Math.abs(sl.needed_strain))}`);
      if (sl.needed_debt     != null && sl.needed_debt   !== 0) lines.push(`  + Debt:           ${sl.needed_debt > 0 ? '+' : ''}${fmtMs(Math.abs(sl.needed_debt))}`);
      if (sl.needed_nap      != null && sl.needed_nap    !== 0) lines.push(`  + Nap credit:     ${sl.needed_nap > 0 ? '+' : '-'}${fmtMs(Math.abs(sl.needed_nap))}`);
    }
    if (sl.performance  != null) lines.push(`Performance:        ${sl.performance}%`);
    if (sl.efficiency   != null) lines.push(`Efficiency:         ${Math.round(sl.efficiency)}%`);
    if (sl.consistency  != null) lines.push(`Consistency:        ${sl.consistency}%`);
    if (sl.respiratory_rate != null) lines.push(`Respiratory rate:   ${sl.respiratory_rate.toFixed(1)} br/min`);
    if (sl.disturbances != null) lines.push(`Disturbances:       ${sl.disturbances}`);
    if (sl.cycles       != null) lines.push(`Sleep cycles:       ${sl.cycles}`);
    const inBed = sl.in_bed_milli || 1;
    if (sl.deep_milli  > 0) lines.push(`Deep (SWS):         ${Math.round(sl.deep_milli  / inBed * 100)}% · ${fmtMs(sl.deep_milli)}`);
    if (sl.rem_milli   > 0) lines.push(`REM:                ${Math.round(sl.rem_milli   / inBed * 100)}% · ${fmtMs(sl.rem_milli)}`);
    if (sl.light_milli > 0) lines.push(`Light:              ${Math.round(sl.light_milli / inBed * 100)}% · ${fmtMs(sl.light_milli)}`);
    if (sl.awake_milli > 0) lines.push(`Awake:              ${Math.round(sl.awake_milli / inBed * 100)}% · ${fmtMs(sl.awake_milli)}`);
  }

  if (wo) {
    const strainLabel = wo.strain >= 18 ? 'All Out' : wo.strain >= 14 ? 'Strenuous' : wo.strain >= 10 ? 'Moderate' : 'Light';
    lines.push(`\nWORKOUT LOAD${wo.sport_name ? ' — ' + wo.sport_name : ''}`);
    lines.push(`Score state:        ${wo.score_state || 'unknown'}`);
    if (wo.strain           != null) lines.push(`Workout strain:     ${wo.strain.toFixed(1)} (${strainLabel})`);
    if (wo.avg_hr           != null) lines.push(`Avg HR (workout):   ${Math.round(wo.avg_hr)} bpm`);
    if (wo.max_hr           != null) lines.push(`Max HR (workout):   ${Math.round(wo.max_hr)} bpm`);
    if (wo.kilojoule)                lines.push(`Calories (workout): ${Math.round(wo.kilojoule / 4.184)} kcal`);
    if (wo.distance_meter)           lines.push(`Distance (Whoop):   ${(wo.distance_meter / 1000).toFixed(2)} km`);
    if (wo.altitude_gain)            lines.push(`Elevation gain:     ${Math.round(wo.altitude_gain)} m`);
    if (wo.percent_recorded != null) lines.push(`Data recorded:      ${wo.percent_recorded}%`);
    const totalZoneMs = (wo.zone_zero_milli||0)+(wo.zone_one_milli||0)+(wo.zone_two_milli||0)+
                        (wo.zone_three_milli||0)+(wo.zone_four_milli||0)+(wo.zone_five_milli||0) || 1;
    if (wo.zone_five_milli  > 0) lines.push(`Z5 Max (90%+):      ${Math.round(wo.zone_five_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_five_milli)}`);
    if (wo.zone_four_milli  > 0) lines.push(`Z4 Hard (80-90%):   ${Math.round(wo.zone_four_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_four_milli)}`);
    if (wo.zone_three_milli > 0) lines.push(`Z3 Tempo (70-80%):  ${Math.round(wo.zone_three_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_three_milli)}`);
    if (wo.zone_two_milli   > 0) lines.push(`Z2 Aerobic (60-70%):${Math.round(wo.zone_two_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_two_milli)}`);
    if (wo.zone_one_milli   > 0) lines.push(`Z1 Light (50-60%):  ${Math.round(wo.zone_one_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_one_milli)}`);
    if (wo.zone_zero_milli  > 0) lines.push(`Z0 Rest (<50%):     ${Math.round(wo.zone_zero_milli/totalZoneMs*100)}% · ${fmtMs(wo.zone_zero_milli)}`);
  }

  if (cy) {
    lines.push('\nDAY TOTAL — STRAIN (full physiological day, all activities)');
    if (cy.strain  != null) lines.push(`Day strain:         ${cy.strain.toFixed(1)}`);
    if (cy.avg_hr  != null) lines.push(`Avg HR (day):       ${Math.round(cy.avg_hr)} bpm`);
    if (cy.max_hr  != null) lines.push(`Max HR (day):       ${Math.round(cy.max_hr)} bpm`);
    if (cy.kilojoule)       lines.push(`Calories (day):     ${Math.round(cy.kilojoule / 4.184)} kcal`);
  }

  if (psl) {
    const asleepMs = (psl.in_bed_milli || 0) - (psl.awake_milli || 0);
    lines.push('\nNEXT NIGHT — SLEEP (post-activity recovery)');
    lines.push(`Sleep window:       ${fmtClockFromIso(psl.start)} → ${fmtClockFromIso(psl.end)}`);
    lines.push(`Score state:        ${psl.score_state || 'unknown'}`);
    if (psl.in_bed_milli != null) lines.push(`Time in bed:        ${fmtMs(psl.in_bed_milli)}`);
    if (asleepMs > 0)             lines.push(`Time asleep:        ${fmtMs(asleepMs)}`);
    if (psl.needed_milli != null) {
      lines.push(`Sleep needed:       ${fmtMs(psl.needed_milli)}`);
      if (psl.needed_baseline != null) lines.push(`  Baseline:         ${fmtMs(psl.needed_baseline)}`);
      if (psl.needed_strain != null && psl.needed_strain !== 0) lines.push(`  + Strain:         ${psl.needed_strain > 0 ? '+' : ''}${fmtMs(Math.abs(psl.needed_strain))}`);
      if (psl.needed_debt   != null && psl.needed_debt   !== 0) lines.push(`  + Debt:           ${psl.needed_debt > 0 ? '+' : ''}${fmtMs(Math.abs(psl.needed_debt))}`);
      if (psl.needed_nap    != null && psl.needed_nap    !== 0) lines.push(`  + Nap credit:     ${psl.needed_nap > 0 ? '+' : '-'}${fmtMs(Math.abs(psl.needed_nap))}`);
    }
    if (psl.performance  != null) lines.push(`Performance:        ${psl.performance}%`);
    if (psl.efficiency   != null) lines.push(`Efficiency:         ${Math.round(psl.efficiency)}%`);
    if (psl.consistency  != null) lines.push(`Consistency:        ${psl.consistency}%`);
    if (psl.respiratory_rate != null) lines.push(`Respiratory rate:   ${psl.respiratory_rate.toFixed(1)} br/min`);
    if (psl.disturbances != null) lines.push(`Disturbances:       ${psl.disturbances}`);
    if (psl.cycles       != null) lines.push(`Sleep cycles:       ${psl.cycles}`);
    const inBed = psl.in_bed_milli || 1;
    if (psl.deep_milli  > 0) lines.push(`Deep (SWS):         ${Math.round(psl.deep_milli  / inBed * 100)}% · ${fmtMs(psl.deep_milli)}`);
    if (psl.rem_milli   > 0) lines.push(`REM:                ${Math.round(psl.rem_milli   / inBed * 100)}% · ${fmtMs(psl.rem_milli)}`);
    if (psl.light_milli > 0) lines.push(`Light:              ${Math.round(psl.light_milli / inBed * 100)}% · ${fmtMs(psl.light_milli)}`);
    if (psl.awake_milli > 0) lines.push(`Awake:              ${Math.round(psl.awake_milli / inBed * 100)}% · ${fmtMs(psl.awake_milli)}`);
  }

  if (prec) {
    lines.push('\nNEXT MORNING — RECOVERY (post-activity)');
    if (prec.score != null) lines.push(`Recovery score:     ${prec.score}% (${prec.state})`);
    else lines.push(`Recovery:           ${prec.state || 'N/A'}`);
    if (prec.hrv_rmssd  != null) lines.push(`HRV (RMSSD):        ${Math.round(prec.hrv_rmssd)} ms`);
    if (prec.resting_hr != null) lines.push(`Resting HR:         ${prec.resting_hr} bpm`);
    if (prec.spo2       != null) lines.push(`SpO2:               ${prec.spo2.toFixed(1)}%`);
    if (prec.skin_temp  != null) lines.push(`Skin temp:          ${prec.skin_temp.toFixed(1)}°C`);
  }

  const bm = d.body;
  if (bm) {
    lines.push('\nBODY MEASUREMENTS');
    if (bm.max_heart_rate  != null) lines.push(`Max HR (Whoop):     ${bm.max_heart_rate} bpm`);
    if (bm.weight_kilogram != null) lines.push(`Weight:             ${bm.weight_kilogram.toFixed(1)} kg`);
    if (bm.height_meter    != null) lines.push(`Height:             ${Math.round(bm.height_meter * 100)} cm`);
  }

  if (d._errors) {
    lines.push('\nWHOOP API ERRORS (data may be incomplete)');
    Object.entries(d._errors).forEach(([k, v]) => lines.push(`  ${k}: ${v}`));
  }

  return lines.join('\n');
}

function copyToClipboard() {
  if (!currentActivity || !streamData) return;
  const modal = document.getElementById('copy-modal');
  if (modal) {

function executeCopy(includeNotes) {
  const modal = document.getElementById('copy-modal');
  if (modal) modal.style.display = 'none';

  if (!currentActivity || !streamData) return;

  const startTime    = fmtClock(currentActivity.start_date_local);
  const endTime      = fmtClockEnd(currentActivity.start_date_local, currentActivity.elapsed_time || currentActivity.moving_time);
  const effortRating = includeNotes ? (document.getElementById('modal-effort')?.value || '') : '';
  const effortNotes  = includeNotes ? (document.getElementById('modal-notes')?.value?.trim() || '') : '';

  const hr    = streamData.heartrate?.data || [];
  const vel   = streamData.velocity_smooth?.data || [];
  const alt   = streamData.altitude?.data || [];
  const time  = streamData.time?.data || [];
  const dist  = streamData.distance?.data || [];
  const grade = streamData.grade_smooth?.data || [];
  const cad   = streamData.cadence?.data || [];
  const watts = streamData.watts?.data || [];
  const temp  = streamData.temp?.data || [];
  const moving= streamData.moving?.data || [];

  const avgHR  = hr.length  ? Math.round(avg(hr))  : null;
  const maxHR  = hr.length  ? Math.max(...hr)       : null;
  const minHR  = hr.length  ? Math.min(...hr)       : null;
  const avgVel = avg(vel.filter(v => v > 0));
  const maxVel = vel.length ? Math.max(...vel)      : 0;
  const elevGain = alt.length ? Math.round(alt.reduce((g,v,i) => i>0 && v>alt[i-1] ? g+(v-alt[i-1]) : g, 0)) : 0;
  const elevLoss = alt.length ? Math.round(alt.reduce((g,v,i) => i>0 && v<alt[i-1] ? g+(alt[i-1]-v) : g, 0)) : 0;
  const avgCad   = cad.length   ? Math.round(avg(cad.filter(v=>v>0)) * 2) : null;
  const avgWatts = watts.length ? Math.round(avg(watts.filter(v=>v>0))) : null;
  const avgTemp  = temp.length  ? Math.round(avg(temp)) : null;

  const pauses = [];

  if (moving.length > 0) {
    let inPause = false, pauseStart = -1;
    for (let i = 0; i < moving.length; i++) {
      if (!moving[i] && !inPause) { inPause = true; pauseStart = i; }
      else if (moving[i] && inPause) {
        inPause = false;
        const dur = (time[i] || 0) - (time[pauseStart] || 0);
        if (dur >= 5) pauses.push({ pauseIdx: pauseStart, resumeIdx: i, pauseDist: dist[pauseStart]||0, resumeDist: dist[i]||0, pauseTime: time[pauseStart]||0, resumeTime: time[i]||0, duration: dur });
      }
    }
  }

  const globalAvgVel = avg(vel.filter(v => v > 0)) || 3;
  for (let i = 1; i < time.length; i++) {
    const dt = (time[i] || 0) - (time[i-1] || 0);
    const dd = (dist[i] || 0) - (dist[i-1] || 0);
    const expectedTime = dd / globalAvgVel;
    const excessTime = dt - expectedTime;
    if (excessTime > 20) {
      const alreadyCaught = pauses.some(p => Math.abs(p.pauseTime - (time[i-1]||0)) < 5);
      if (!alreadyCaught) {
        pauses.push({ pauseIdx: i-1, resumeIdx: i, pauseDist: dist[i-1]||0, resumeDist: dist[i]||0, pauseTime: time[i-1]||0, resumeTime: time[i]||0, duration: Math.round(excessTime) });
      }
    }
  }

  pauses.sort((a, b) => a.pauseTime - b.pauseTime);
  const totalPausedSecs = pauses.reduce((s, p) => s + p.duration, 0);

  const stream100m = [];
  const totalDist = dist.length ? dist[dist.length-1] : 0;

  const pausesByMarker = {};
  pauses.forEach(p => {
    const marker = Math.ceil(p.pauseDist / 50) * 50;
    pausesByMarker[marker] = p;
  });

  for (let marker = 0; marker <= totalDist; marker += 50) {
    if (pausesByMarker[marker]) {
      const p = pausesByMarker[marker];
      stream100m.push({ isPause: true, pauseDist: (p.pauseDist/1000).toFixed(2), resumeDist: (p.resumeDist/1000).toFixed(2), pauseTime: fmtTime(p.pauseTime), resumeTime: fmtTime(p.resumeTime), duration: fmtTime(p.duration) });
    }

    let closest = 0, closestDiff = Infinity;
    for (let i = 0; i < dist.length; i++) {
      const diff = Math.abs(dist[i] - marker);
      if (diff < closestDiff) { closestDiff = diff; closest = i; }
      if (dist[i] > marker + 50) break;
    }
    const i = closest;
    const insidePause = pauses.some(p => time[i] >= p.pauseTime && time[i] <= p.resumeTime);

    const cadSpm = cad[i] ? cad[i] * 2 : null;
    const strideLen = (vel[i] > 0 && cadSpm) ? (vel[i] / (cadSpm / 60)).toFixed(2) : null;
    const gradeAdj = grade[i] !== undefined ? grade[i] : 0;
    const gapVel = vel[i] > 0 ? vel[i] / (1 + gradeAdj * 0.033) : null;

    stream100m.push({
      isPause: false, insidePause,
      dist: (marker / 1000).toFixed(2),
      time: fmtTime(time[i] || 0),
      pace: (!insidePause && vel[i] > 0) ? fmtPace(vel[i]) : null,
      gap:  (!insidePause && gapVel)     ? fmtPace(gapVel) : null,
      hr:   hr[i]      ? Math.round(hr[i]) : null,
      alt:  alt[i] !== undefined ? Math.round(alt[i]) : null,
      grade: grade[i] !== undefined ? grade[i].toFixed(1) : null,
      cad:  (!insidePause && cadSpm) ? cadSpm : null,
      stride: (!insidePause) ? strideLen : null,
      watts: (!insidePause && watts[i]) ? Math.round(watts[i]) : null,
      temp:  temp[i]   ? temp[i] : null,
    });
  }

  const spikes = detectSpikes(hr, vel, alt, time, dist, grade);
  const splits = buildSplitsTable(hr, vel, alt, dist, time, cad);
  const zones  = calcZones(hr, time);

  const hasCad    = stream100m.some(p => !p.isPause && p.cad);
  const hasStride = stream100m.some(p => !p.isPause && p.stride);
  const hasGAP    = stream100m.some(p => !p.isPause && p.gap);
  const hasWatts  = stream100m.some(p => !p.isPause && p.watts);
  const hasTemp   = stream100m.some(p => !p.isPause && p.temp);

  const streamLines = stream100m.map(p => {
    if (p.isPause) {
      return `  WATCH PAUSED at ${p.pauseDist}km (${p.pauseTime}) -- resumed at ${p.resumeDist}km (${p.resumeTime}) · paused for ${p.duration}`;
    }
    let line = `  ${p.dist}km | t:${p.time} | pace:${p.pace||'--'}/km`;
    if (hasGAP)    line += ` | GAP:${p.gap||'--'}/km`;
    line += ` | HR:${p.hr||'--'}bpm`;
    line += ` | alt:${p.alt !== null ? p.alt+'m' : '--'}`;
    line += ` | grade:${p.grade !== null ? p.grade+'%' : '--'}`;
    if (hasCad)    line += ` | cad:${p.cad||'--'}spm`;
    if (hasStride) line += ` | stride:${p.stride||'--'}m`;
    if (hasWatts)  line += ` | watts:${p.watts||'--'}W`;
    if (hasTemp)   line += ` | temp:${p.temp||'--'}C`;
    return line;
  }).join('\n');

  const txt = `STRAVA SESSION -- ${currentActivity.name}
Date: ${fmtDate(currentActivity.start_date_local)}
Type: ${(['Run','Race','Long run','Workout'][currentActivity.workout_type]) || 'Run'}${currentActivity.location_city ? ` · ${currentActivity.location_city}` : ''}
-----------------------------------------
SUMMARY
Distance:       ${fmtDist(currentActivity.distance)}
Moving time:    ${fmtTime(currentActivity.moving_time)}
Elapsed time:   ${fmtTime(currentActivity.elapsed_time || currentActivity.moving_time)}
Start time:     ${startTime}
End time:       ${endTime}
Avg pace:       ${fmtPace(currentActivity.average_speed)} /km
Best pace:      ${fmtPace(maxVel)} /km
Avg HR:         ${avgHR || '--'} bpm
Max HR:         ${maxHR || '--'} bpm
Min HR:         ${minHR || '--'} bpm
Elevation gain: ${elevGain}m
Elevation loss: ${elevLoss}m
${avgCad  ? `Avg cadence:    ${avgCad} spm\n` : ''}\
${avgWatts? `Avg power:      ${avgWatts}W\n` : ''}\
${avgTemp ? `Avg temp:       ${avgTemp}C\n` : ''}\
Suffer score:   ${currentActivity.suffer_score || 'N/A'}
Calories:       ${currentActivity.calories || 'N/A'} kcal
${pauses.length ? `Watch pauses:   ${pauses.length} pause${pauses.length>1?'s':''} · total paused time ${fmtTime(totalPausedSecs)}\n` : ''}\
${effortRating ? `Perceived effort: ${effortRating}/10\n` : ''}\
${effortNotes  ? `How I felt:     ${effortNotes}\n` : ''}
HR ZONES (based on 200bpm max)
${zones.map(z => `  ${z.name}: ${z.pct}% -- ${fmtTime(z.secs)}`).join('\n')}

PER-KM SPLITS
${splits.map(s => `  KM ${s.km}: pace ${s.pace}/km · HR ${s.hr} · elev ${s.elev}`).join('\n')}

NOTABLE MOMENTS
${spikes.map(s => `  ${s.at} -- ${s.title} (${s.detail})`).join('\n')}

RAW STREAM (every 50m)
Columns: dist | elapsed | pace | ${hasGAP?'GAP | ':''}HR | altitude | grade${hasCad?' | cadence':''}${hasStride?' | stride':''}${hasWatts?' | power':''}${hasTemp?' | temp':''}
${streamLines}${whoopData ? formatWhoopForClipboard(whoopData) : ''}`;

  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy session data`;
    }, 2500);
  }).catch(() => {
    prompt('Copy this text:', txt);
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { const m = document.getElementById('copy-modal'); if (m) m.style.display = 'none'; } });

init();
</script>

<div id="copy-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;width:460px;max-width:92vw;">
    <div style="font-size:15px;font-weight:700;letter-spacing:-0.02em;margin-bottom:20px;color:var(--text);">Session notes <span style="font-weight:400;font-size:12px;color:var(--faint);">(optional — press Skip to copy without)</span></div>
    <div class="effort-row" style="margin-bottom:14px;">
      <span class="effort-lbl">Perceived effort</span>
      <select class="effort-select" id="modal-effort" style="flex:1;">
        <option value="">— skip —</option>
        <option value="1">1 — Very easy</option>
        <option value="2">2 — Easy</option>
        <option value="3">3 — Moderate</option>
        <option value="4">4 — Somewhat hard</option>
        <option value="5">5 — Hard (low)</option>
        <option value="6">6 — Hard (high)</option>
        <option value="7">7 — Very hard (low)</option>
        <option value="8">8 — Very hard (high)</option>
        <option value="9">9 — Extremely hard</option>
        <option value="10">10 — Maximum (all out effort)</option>
      </select>
    </div>
    <div class="effort-row" style="margin-bottom:22px;">
      <span class="effort-lbl">How I felt</span>
      <input type="text" class="effort-input" id="modal-notes" placeholder="e.g. legs felt heavy, strong finish…" maxlength="300">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-disconnect" onclick="executeCopy(false)">Skip &amp; copy</button>
      <button onclick="executeCopy(true)" style="background:var(--orange);color:white;border:none;padding:8px 20px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;">Add notes &amp; copy</button>
    </div>
  </div>
</div>
</body>
</html>
